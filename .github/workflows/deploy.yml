name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── Frontend → GitHub Pages ──────────────────────────────────────────────────
  # The frontend is the static files in /public.
  # config.js contains the placeholder __BACKEND_URL_PLACEHOLDER__ which is
  # replaced here with the real backend URL (stored as a GitHub secret).
  #
  # Required secrets:
  #   RENDER_BACKEND_URL  → e.g. https://roadmap-manager-latest.onrender.com
  #
  # Local development:
  #   Serve /public with any static server on port 5000:
  #     npx serve public -p 5000
  #   config.js will auto-detect localhost and point to http://localhost:3000
  deploy-frontend:
    name: Deploy Frontend to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Inject Backend URL into config.js
        run: |
          if [ -n "${{ secrets.RENDER_BACKEND_URL }}" ]; then
            echo "Injecting RENDER_BACKEND_URL: ${{ secrets.RENDER_BACKEND_URL }}"
            sed -i "s|__BACKEND_URL_PLACEHOLDER__|${{ secrets.RENDER_BACKEND_URL }}|g" public/js/config.js
          else
            echo "⚠️  RENDER_BACKEND_URL secret is not set. Frontend will use window.location.origin as API URL."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Backend → Docker Hub + Render ───────────────────────────────────────────
  # Required secrets:
  #   DOCKERHUB_USERNAME, DOCKERHUB_TOKEN, DOCKERHUB_REPO
  #   RENDER_DEPLOY_HOOK_URL  (optional — triggers redeploy on Render)
  build-and-push-docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPO }}:v${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Render Deployment
        if: success()
        run: |
          if [ -n "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then
            curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
            echo "✅ Render deploy triggered."
          else
            echo "ℹ️  RENDER_DEPLOY_HOOK_URL secret not set. Skipping trigger."
          fi
          fi
